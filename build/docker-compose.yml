services:
  nanopaste:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: build/Dockerfile
    image: nanopaste:latest
    container_name: nanopaste
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${HOST_PORT:-8989}:${APP_PORT:-8080}"
    environment:
      PORT: "${APP_PORT:-8080}"
      SQLITE_DSN: "${SQLITE_DSN:-/data/nanopaste.db}"
      WEB_DIST_DIR: "${WEB_DIST_DIR:-/app/web}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      JWT_ISSUER: "${JWT_ISSUER:-nanopaste}"
      ACCESS_TOKEN_TTL_MINUTES: "${ACCESS_TOKEN_TTL_MINUTES:-60}"
      REFRESH_TOKEN_TTL_HOURS: "${REFRESH_TOKEN_TTL_HOURS:-720}"
    volumes:
      - ./data:/data
